services:
  - type: web
    name: recruitercheck-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false   # you'll paste this in the Render dashboard
    disk:
      name: model-weights
      mountPath: /opt/render/project/src/recruitcheck_model
      sizeGB: 2
